services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      ADMIN_PIN: "${ADMIN_PIN:-1234}"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-12h}"
    volumes:
      - queue-data:/app/data

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - server

volumes:
  queue-data:


